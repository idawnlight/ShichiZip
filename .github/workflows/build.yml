name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-build:
    name: macOS Build (${{ matrix.artifact_prefix }}, ${{ matrix.target_arch }})
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: ShichiZip
            make_target: lib-mainline
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
            target_arch: arm64
          - scheme: ShichiZip
            make_target: lib-mainline
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
            target_arch: x86_64
          - scheme: ShichiZipZS
            make_target: lib-zs
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
            target_arch: arm64
          - scheme: ShichiZipZS
            make_target: lib-zs
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
            target_arch: x86_64
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      XCODE_PROJECT: ShichiZip.xcodeproj
      XCODE_CONFIGURATION: Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build tools
        run: brew install xcodegen zig

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Build lib7zip
        run: make -j"$(sysctl -n hw.ncpu)" TARGET_ARCH="${{ matrix.target_arch }}" "${{ matrix.make_target }}"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app bundle
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath "$derived_data_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS="${{ matrix.target_arch }}" \
            VALID_ARCHS="${{ matrix.target_arch }}" \
            build

      - name: Ad hoc sign app bundle
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"
          quick_action_entitlements="ShichiZip/QuickActions/Resources/QuickAction.entitlements"
          app_entitlements="ShichiZip/Resources/ShichiZip.entitlements"

          test -d "$app_path"

          for appex in "$app_path"/Contents/PlugIns/*.appex; do
            codesign --force --sign - --entitlements "$quick_action_entitlements" "$appex"
          done

          codesign --force --sign - --entitlements "$app_entitlements" "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Package app artifact
        id: package_artifact
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"
          artifact_dir="build/artifacts/${{ matrix.scheme }}"
          artifact_path="${artifact_dir}/${{ matrix.artifact_prefix }}-${XCODE_CONFIGURATION}-${{ matrix.target_arch }}.zip"

          test -d "$app_path"
          mkdir -p "$artifact_dir"
          rm -f "$artifact_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$artifact_path"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-${{ env.XCODE_CONFIGURATION }}-macOS-${{ matrix.target_arch }}
          path: ${{ steps.package_artifact.outputs.path }}
          if-no-files-found: error
          archive: false
