name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-build:
    name: macOS Build
    runs-on: macos-26
    timeout-minutes: 45
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      XCODE_PROJECT: ShichiZip.xcodeproj
      XCODE_SCHEME: ShichiZip
      XCODE_CONFIGURATION: Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Detect host architecture
        run: |
          host_arch="$(uname -m)"
          case "$host_arch" in
            arm64|x86_64)
              ;;
            *)
              echo "Unsupported architecture: $host_arch" >&2
              exit 1
              ;;
          esac
          echo "HOST_ARCH=$host_arch" >> "$GITHUB_ENV"

      - name: Build lib7zip
        run: make -j"$(sysctl -n hw.ncpu)" ARCH="-arch ${HOST_ARCH}"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app bundle
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS="$HOST_ARCH" \
            VALID_ARCHS="$HOST_ARCH" \
            build

      - name: Package app artifact
        run: |
          app_path="build/DerivedData/Build/Products/${XCODE_CONFIGURATION}/ShichiZip.app"
          test -d "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "ShichiZip-${XCODE_CONFIGURATION}-${HOST_ARCH}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ShichiZip-${{ env.XCODE_CONFIGURATION }}-macOS
          path: ShichiZip-${{ env.XCODE_CONFIGURATION }}-*.zip
          if-no-files-found: error