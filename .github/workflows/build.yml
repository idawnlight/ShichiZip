name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-build:
    name: macOS Build (${{ matrix.artifact_prefix }}, ${{ matrix.target_arch }})
    runs-on: macos-26
    environment: development
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: ShichiZip
            zig_variant: mainline
            zig_target: aarch64-native
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
            target_arch: arm64
          - scheme: ShichiZip
            zig_variant: mainline
            zig_target: x86_64-native
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
            target_arch: x86_64
          - scheme: ShichiZipZS
            zig_variant: zs
            zig_target: aarch64-native
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
            target_arch: arm64
          - scheme: ShichiZipZS
            zig_variant: zs
            zig_target: x86_64-native
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
            target_arch: x86_64
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      XCODE_PROJECT: ShichiZip.xcodeproj
      XCODE_CONFIGURATION: Debug

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          version: 0.16.0

      - name: Install build tools
        run: brew install xcodegen

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Build archive core artifacts
        run: |
          zig build lib \
            -Dvariant="${{ matrix.zig_variant }}" \
            -Dtarget="${{ matrix.zig_target }}" \
            -Doptimize=ReleaseFast \
            -p build \
            --summary all \
            --verbose

          zig build sfx \
            -Dvariant="${{ matrix.zig_variant }}" \
            -Doptimize=ReleaseSmall \
            -p build \
            --summary all \
            --verbose

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f "$CERT_PATH"

      - name: Build and sign app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath "$derived_data_path" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            ARCHS="${{ matrix.target_arch }}" \
            VALID_ARCHS="${{ matrix.target_arch }}" \
            build

      - name: Verify app bundle signature
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"

          test -d "$app_path"

          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Package app artifact
        id: package_artifact
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"
          artifact_dir="build/artifacts/${{ matrix.scheme }}"
          artifact_path="${artifact_dir}/${{ matrix.artifact_prefix }}-${XCODE_CONFIGURATION}-${{ matrix.target_arch }}.zip"

          test -d "$app_path"
          mkdir -p "$artifact_dir"
          rm -f "$artifact_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$artifact_path"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-${{ env.XCODE_CONFIGURATION }}-macOS-${{ matrix.target_arch }}
          path: ${{ steps.package_artifact.outputs.path }}
          if-no-files-found: error
          archive: false
