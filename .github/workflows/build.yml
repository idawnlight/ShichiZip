name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-build:
    name: macOS Build (${{ matrix.artifact_prefix }})
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: ShichiZip
            make_target: lib-mainline
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
          - scheme: ShichiZipZS
            make_target: lib-zs
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      XCODE_PROJECT: ShichiZip.xcodeproj
      XCODE_CONFIGURATION: Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Detect host architecture
        run: |
          host_arch="$(uname -m)"
          case "$host_arch" in
            arm64|x86_64)
              ;;
            *)
              echo "Unsupported architecture: $host_arch" >&2
              exit 1
              ;;
          esac
          echo "HOST_ARCH=$host_arch" >> "$GITHUB_ENV"

      - name: Build lib7zip
        run: make -j"$(sysctl -n hw.ncpu)" ARCH="-arch ${HOST_ARCH}" "${{ matrix.make_target }}"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app bundle
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath "$derived_data_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS="$HOST_ARCH" \
            VALID_ARCHS="$HOST_ARCH" \
            build

      - name: Ad hoc sign app bundle
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"
          quick_action_entitlements="ShichiZip/QuickActions/Resources/QuickAction.entitlements"
          app_entitlements="ShichiZip/Resources/ShichiZip.entitlements"

          test -d "$app_path"

          for appex in "$app_path"/Contents/PlugIns/*.appex; do
            codesign --force --sign - --entitlements "$quick_action_entitlements" "$appex"
          done

          codesign --force --sign - --entitlements "$app_entitlements" "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Package app artifact
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"
          test -d "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "${{ matrix.artifact_prefix }}-${XCODE_CONFIGURATION}-${HOST_ARCH}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-${{ env.XCODE_CONFIGURATION }}-macOS
          path: ${{ matrix.artifact_prefix }}-${{ env.XCODE_CONFIGURATION }}-*.zip
          if-no-files-found: error
          archive: false