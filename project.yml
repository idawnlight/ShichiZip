name: ShichiZip
options:
  bundleIdPrefix: ee.dawn
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.0.4"
    CURRENT_PROJECT_VERSION: "1" # placeholder, will be overridden by build script
    SWIFT_VERSION: "6.0"
  configs:
    Debug:
      ENABLE_HARDENED_RUNTIME: false
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: VNM753Y3JX
    Release:
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
      ENABLE_DEBUG_DYLIB: false
      DEAD_CODE_STRIPPING: YES
      DEPLOYMENT_POSTPROCESSING: YES
      STRIP_INSTALLED_PRODUCT: YES
      STRIP_STYLE: all
      STRIP_SWIFT_SYMBOLS: YES
      STRINGS_FILE_OUTPUT_ENCODING: binary
      PLIST_FILE_OUTPUT_FORMAT: binary

targets:
  ShichiZip:
    type: application
    platform: macOS
    postBuildScripts:
      - name: Generate Build Metadata
        basedOnDependencyAnalysis: false
        script: |
          sh "${SRCROOT}/build/generate-build-metadata.sh"
    sources:
      - path: ShichiZip
        excludes:
          - "**/*.entitlements"
          - "QuickActions/Extensions/**"
    dependencies:
      - target: ShichiZipShowInFileManagerAction
        embed: true
      - target: ShichiZipOpenInShichiZipAction
        embed: true
      - target: ShichiZipSmartQuickExtractAction
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip
        PRODUCT_NAME: ShichiZip
        SHICHIZIP_APP_DISPLAY_NAME: ShichiZip
        SHICHIZIP_ARCHIVE_CORE_NAME: 7-Zip
        SHICHIZIP_COPYRIGHT_LINE: "GitHub: idawnlight/ShichiZip, 7-Zip based."
        SHICHIZIP_LICENSE_SOURCE_PATH: vendor/7zip/DOC/License.txt
        SHICHIZIP_SFX_SOURCE_PATH: build/sfx/7z-mainline-x86.sfx
        SHICHIZIP_QUICK_ACTION_PASTEBOARD_TYPE: ee.dawn.ShichiZip.quick-action-request
        SHICHIZIP_QUICK_ACTION_URL_SCHEME: shichizip
        SEVENZ_LIBRARY_NAME: lib7zip.a
        SEVENZ_VENDOR_ROOT: vendor/7zip
        INFOPLIST_FILE: ShichiZip/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShichiZip/Resources/ShichiZip.entitlements
        CLANG_CXX_LANGUAGE_STANDARD: c++23
        SWIFT_OBJC_BRIDGING_HEADER: ShichiZip/App/ShichiZip-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/$(SEVENZ_VENDOR_ROOT)
          - $(PROJECT_DIR)/$(SEVENZ_VENDOR_ROOT)/CPP
          - $(PROJECT_DIR)/$(SEVENZ_VENDOR_ROOT)/C
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/build/lib
        OTHER_LDFLAGS:
          - -force_load
          - $(PROJECT_DIR)/build/lib/$(SEVENZ_LIBRARY_NAME)
          - -liconv
          - -lpthread
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: false
        CLANG_ENABLE_OBJC_ARC: true
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NDEBUG=1"
          - "SHICHIZIP_ZS_VARIANT=0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS:
          - "$(inherited)"
        CLANG_WARN_DOCUMENTATION_COMMENTS: false

  ShichiZipTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ShichiZipTests
    dependencies:
      - target: ShichiZip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipTests
        PRODUCT_NAME: ShichiZipTests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_OBJC_BRIDGING_HEADER: ShichiZipTests/ShichiZipTests-Bridging-Header.h
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShichiZip.app/Contents/MacOS/ShichiZip
        BUNDLE_LOADER: $(TEST_HOST)

  ShichiZipUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ShichiZipUITests
    dependencies:
      - target: ShichiZip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipUITests
        PRODUCT_NAME: ShichiZipUITests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: ShichiZip

