name: ShichiZip
options:
  bundleIdPrefix: com.shichizip
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  ShichiZip:
    type: application
    platform: macOS
    sources:
      - path: ShichiZip
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shichizip.ShichiZip
        PRODUCT_NAME: ShichiZip
        INFOPLIST_FILE: ShichiZip/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShichiZip/Resources/ShichiZip.entitlements
        ARCHS: arm64
        VALID_ARCHS: arm64
        CLANG_CXX_LANGUAGE_STANDARD: c++11
        SWIFT_OBJC_BRIDGING_HEADER: ShichiZip/App/ShichiZip-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/vendor/7zip
          - $(PROJECT_DIR)/vendor/7zip/CPP
          - $(PROJECT_DIR)/vendor/7zip/C
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/build/lib
        OTHER_LDFLAGS:
          - -l7zip
          - -lpthread
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CLANG_ENABLE_OBJC_ARC: true
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NDEBUG=1"
        OTHER_CPLUSPLUSFLAGS:
          - "$(inherited)"
          - "-Wno-everything"  # 7-Zip headers generate many warnings
        CLANG_WARN_DOCUMENTATION_COMMENTS: false
        GCC_WARN_INHIBIT_ALL_WARNINGS: true
