name: ShichiZip
options:
  bundleIdPrefix: ee.dawn
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  ShichiZip:
    type: application
    platform: macOS
    postBuildScripts:
      - name: Generate Build Metadata
        basedOnDependencyAnalysis: false
        script: |
          set -eu

          info_plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          commit_count="$(git -C "${SRCROOT}" rev-list --count HEAD 2>/dev/null || printf '0')"
          short_hash="$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || printf 'unknown')"
          license_source="${SRCROOT}/vendor/7zip/DOC/License.txt"
          license_dest="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/7zip-license.txt"
          sfx_source="${SRCROOT}/vendor/7z.sfx"
          sfx_dest="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/7z.sfx"

          set_plist_value() {
            local plist_path="$1"
            local key="$2"
            local value="$3"

            if /usr/libexec/PlistBuddy -c "Print :${key}" "${plist_path}" >/dev/null 2>&1; then
              /usr/libexec/PlistBuddy -c "Set :${key} ${value}" "${plist_path}"
            else
              /usr/libexec/PlistBuddy -c "Add :${key} string ${value}" "${plist_path}"
            fi
          }

          set_plist_value "${info_plist}" "ShichiZipGitCommitCount" "${commit_count}"
          set_plist_value "${info_plist}" "ShichiZipGitShortHash" "${short_hash}"

          mkdir -p "$(dirname "${license_dest}")"
          cp "${license_source}" "${license_dest}"

          if [ -f "${sfx_source}" ]; then
            cp "${sfx_source}" "${sfx_dest}"
          fi
    sources:
      - path: ShichiZip
        excludes:
          - "**/*.entitlements"
          - "QuickActions/Extensions/**"
    dependencies:
      - target: ShichiZipShowInFileManagerAction
        embed: true
      - target: ShichiZipOpenInShichiZipAction
        embed: true
      - target: ShichiZipSmartQuickExtractAction
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip
        PRODUCT_NAME: ShichiZip
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ShichiZip/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShichiZip/Resources/ShichiZip.entitlements
        ARCHS: arm64
        VALID_ARCHS: arm64
        CLANG_CXX_LANGUAGE_STANDARD: c++11
        SWIFT_OBJC_BRIDGING_HEADER: ShichiZip/App/ShichiZip-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/vendor/7zip
          - $(PROJECT_DIR)/vendor/7zip/CPP
          - $(PROJECT_DIR)/vendor/7zip/C
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/build/lib
        OTHER_LDFLAGS:
          - -force_load
          - $(PROJECT_DIR)/build/lib/lib7zip.a
          - -liconv
          - -lpthread
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CLANG_ENABLE_OBJC_ARC: true
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NDEBUG=1"
        OTHER_CPLUSPLUSFLAGS:
          - "$(inherited)"
          - "-Wno-everything"  # 7-Zip headers generate many warnings
        CLANG_WARN_DOCUMENTATION_COMMENTS: false
        GCC_WARN_INHIBIT_ALL_WARNINGS: true

  ShichiZipShowInFileManagerAction:
    type: app-extension
    platform: macOS
    sources:
      - path: ShichiZip/QuickActions
        excludes:
          - "Resources/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip.ShowInFileManagerAction
        PRODUCT_NAME: ShichiZipShowInFileManagerAction
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ShichiZip/QuickActions/Resources/ShowInFileManagerAction-Info.plist
        CODE_SIGN_ENTITLEMENTS: ShichiZip/QuickActions/Resources/QuickAction.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: true

  ShichiZipOpenInShichiZipAction:
    type: app-extension
    platform: macOS
    sources:
      - path: ShichiZip/QuickActions
        excludes:
          - "Resources/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip.OpenInShichiZipAction
        PRODUCT_NAME: ShichiZipOpenInShichiZipAction
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ShichiZip/QuickActions/Resources/OpenInShichiZipAction-Info.plist
        CODE_SIGN_ENTITLEMENTS: ShichiZip/QuickActions/Resources/QuickAction.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: true

  ShichiZipSmartQuickExtractAction:
    type: app-extension
    platform: macOS
    sources:
      - path: ShichiZip/QuickActions
        excludes:
          - "Resources/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip.SmartQuickExtractAction
        PRODUCT_NAME: ShichiZipSmartQuickExtractAction
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ShichiZip/QuickActions/Resources/SmartQuickExtractAction-Info.plist
        CODE_SIGN_ENTITLEMENTS: ShichiZip/QuickActions/Resources/QuickAction.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: false
        APPLICATION_EXTENSION_API_ONLY: true
